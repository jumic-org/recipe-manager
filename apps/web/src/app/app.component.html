<div class="app-shell">
  <header class="app-header">
    <a routerLink="/" class="app-title">Recipe Manager</a>
    <nav>
      @if (isAuthenticated$ | async) {
        <a routerLink="/recipes" class="nav-link">My Recipes</a>
        <button class="btn-logout" (click)="signOut()">Sign Out</button>
      } @else {
        <a routerLink="/login" class="nav-link">Sign In</a>
      }
    </nav>
  </header>
  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
