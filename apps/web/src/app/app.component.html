<div class="app-shell">
  <header class="app-header">
    <a routerLink="/" class="app-title">{{ 'APP.TITLE' | translate }}</a>
    <nav>
      @if (isAuthenticated$ | async) {
        <a routerLink="/recipes" class="nav-link">{{ 'APP.NAV.MY_RECIPES' | translate }}</a>
        <a routerLink="/change-password" class="nav-link">{{ 'APP.NAV.CHANGE_PASSWORD' | translate }}</a>
        <button class="btn-logout" (click)="signOut()">{{ 'APP.NAV.SIGN_OUT' | translate }}</button>
      } @else {
        <a routerLink="/login" class="nav-link">{{ 'APP.NAV.SIGN_IN' | translate }}</a>
      }
      <span class="lang-switcher">
        <button
          class="btn-lang"
          [class.active]="currentLang === 'en'"
          (click)="switchLanguage('en')"
        >EN</button>
        <button
          class="btn-lang"
          [class.active]="currentLang === 'de'"
          (click)="switchLanguage('de')"
        >DE</button>
      </span>
    </nav>
  </header>
  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
