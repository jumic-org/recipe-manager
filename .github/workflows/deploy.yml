name: Deploy to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  NODE_VERSION: '24'
  STACK_NAME: RecipeManagerStack

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.14.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all applications
        run: pnpm nx run-many -t build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::352770552266:role/RecipeManagerGitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Deploy
        run: pnpm cdk deploy ${{ env.STACK_NAME }} --require-approval never

      # This step retrieves CDK stack outputs (FrontendBucketName, CloudFrontDistributionId)
      # that are needed by subsequent steps to deploy the frontend to S3 and invalidate
      # the CloudFront cache. The aws cloudformation describe-stacks call requires the
      # IAM role (RecipeManagerGitHubDeployRole) to have the
      # cloudformation:DescribeStacks permission on the deployed stack.
      - name: Get CDK Outputs
        id: cdk-outputs
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to S3
        run: |
          aws s3 sync dist/apps/web/browser s3://${{ steps.cdk-outputs.outputs.bucket_name }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cdk-outputs.outputs.distribution_id }} \
            --paths "/*"
