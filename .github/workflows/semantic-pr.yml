name: Semantic PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pr:
    name: Validate PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            ci
            build
            style
            revert
